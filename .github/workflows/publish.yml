name: Publish to Maven Central

# Publishes both Spark builds to Maven Central via the Sonatype Central Portal.
# Triggered by pushing a version tag (e.g. v1.0.0), or manually.
#
# Required repository secrets:
#   CENTRAL_TOKEN_USERNAME   Central Portal / OSSRH user token name  (value part of the token)
#   CENTRAL_TOKEN_PASSWORD   Central Portal / OSSRH user token value
#   SIGNING_KEY              GPG secret key, base64-encoded binary  (Grazel `signing.key`)
#   SIGNING_KEY_ID           GPG key id, e.g. 63BFB9FE5EA9555D      (Grazel `signing.keyId`)
#   SIGNING_PASSWORD         passphrase for the GPG key             (Grazel `signing.password`)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      # Publish sequentially so the two deployments don't race in the Portal.
      max-parallel: 1
      matrix:
        spark-version: ['3.4', '3.5']

    name: Publish (Spark ${{ matrix.spark-version }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 + Maven settings
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          # Writes settings.xml with a `central` server using the token env vars below.
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD

      - name: Import GPG signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          # SIGNING_KEY is base64-encoded binary (Grazel signing.key form), not ASCII-armored,
          # so import it manually rather than via setup-java's gpg-private-key input.
          echo "$SIGNING_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long

      - name: Deploy (Spark ${{ matrix.spark-version }})
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          # maven-gpg-plugin 3.x reads the passphrase from this env var (loopback pinentry).
          MAVEN_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # Tag push -> release version from tag + auto-publish.
          # Manual dispatch -> pom default version, stage only (manual publish in Portal).
          EXTRA=("-Dgpg.keyname=${{ secrets.SIGNING_KEY_ID }}")
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            EXTRA+=("-Drevision=${GITHUB_REF_NAME#v}" "-Dcentral.autoPublish=true")
          else
            EXTRA+=("-Dcentral.autoPublish=false")
          fi
          if [ "${{ matrix.spark-version }}" = "3.4" ]; then
            mvn -B -Prelease -Pspark-3.4 deploy -DskipTests "${EXTRA[@]}"
          else
            mvn -B -Prelease deploy -DskipTests "${EXTRA[@]}"
          fi
